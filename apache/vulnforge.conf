# VulnForge-LAMP is intentionally vulnerable. Never expose this vhost publicly.
Listen 127.0.0.1:8080
<VirtualHost 127.0.0.1:8080>
    ServerName vulnforge.local
    DocumentRoot /var/www/vulnforge/public

    <Directory /var/www/vulnforge/public>
        AllowOverride All
        Require local
        Options -Indexes
    </Directory>

    # Deliberately exposed fake lab artifacts. Directory listing is part of A02.
    Alias /backup/ /var/www/vulnforge/backup/
    <Directory /var/www/vulnforge/backup>
        Require local
        Options Indexes
    </Directory>
    Alias /uploads/ /var/www/vulnforge/uploads/
    <Directory /var/www/vulnforge/uploads>
        Require local
        Options Indexes
        php_admin_flag engine off
    </Directory>
    Alias /logs/ /var/www/vulnforge/logs/
    <Directory /var/www/vulnforge/logs>
        Require local
        Options Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/vulnforge-error.log
    CustomLog ${APACHE_LOG_DIR}/vulnforge-access.log combined
</VirtualHost>
